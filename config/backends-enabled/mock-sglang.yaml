id: mock-sglang
backend_type: sglang
version: 0.4.0
display_name: Mock SGLang 0.4.0
runtime_dir: demo/runtimes/mock-sglang
working_directory: demo/runtimes/mock-sglang
base_url: http://127.0.0.1:19093
launch_command:
  - python3
  - launcher.py
  - --port
  - "19093"
  - --runtime-label
  - mock-sglang
health_path: /health
environment:
  SHARDON_BACKEND_FLAVOR: sglang
capabilities:
  chat: true
  completions: true
  embeddings: true
  batch: true
  openai_compatible: true
  max_context_length: 8192
  extra:
    continuous_batching: true

