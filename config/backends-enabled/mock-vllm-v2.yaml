id: mock-vllm-v2
backend_type: vllm
version: 0.7.0
display_name: Mock vLLM 0.7.0
runtime_dir: demo/runtimes/mock-vllm-v2
working_directory: demo/runtimes/mock-vllm-v2
base_url: http://127.0.0.1:19092
launch_command:
  - python3
  - launcher.py
  - --port
  - "19092"
  - --runtime-label
  - mock-vllm-v2
health_path: /health
environment:
  SHARDON_BACKEND_FLAVOR: vllm
capabilities:
  chat: true
  completions: true
  embeddings: false
  batch: true
  openai_compatible: true
  max_context_length: 16384
  extra:
    speculative_decode: true

