[tool.uv.workspace]
members = [
  "packages/shardon_core",
  "apps/admin_api",
  "apps/router_api",
]

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-q"
testpaths = [
  "packages/shardon_core/tests",
  "tests/integration",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

